<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Lower Third - Sincronía Total</title>
  <style>
    @font-face {
      font-family: 'AdventSans-Logo';
      src: url("assets/AdventSans-Logo.otf") format("opentype");
    }

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: 'AdventSans-Logo', sans-serif;
    }

    .container {
      position: relative;
      width: 1920px;
      height: 1080px;
    }

    /* === ÓVALO === */
    #ovalo {
      position: absolute;
      width: 175px;
      height: 175px;
      fill: rgb(143, 189, 234);
      top: 50%;
      left: 50%;
      z-index: 50;
      transform: translate(-50%, -50%) translate3d(-1048px, 400px, 0px);
    }

    @keyframes anim-ovalo {
      0% { 
        transform: translate(-50%, -50%) translate3d(-1048px, 400px, 0px);
        animation-timing-function: ease-out; 
      }
      /* Punto de impacto: llega al centro */
      60% { 
        transform: translate(-50%, -50%) translate3d(0px, 400px, 0px);
        animation-timing-function: linear; 
      }
      /* Retroceso: el punto donde la máscara debe seguirlo */
      100% { 
        transform: translate(-50%, -50%) translate3d(-810px, 400px, 0px);
      }
    }

    /* === MÁSCARA DE RECORTE === */
    #maskContainer {
      position: absolute;
      left: 149.948px;
      top: 879.978px;
      width: 864px;
      height: 119.661px;
      z-index: 10;
      /* Empezamos con un margen extra (105%) para asegurar que el óvalo cubra el inicio */
      clip-path: inset(0 0 0 105%); 
    }

    @keyframes anim-mask {
      0% { clip-path: inset(0 0 0 105%); }
      /* Terminamos en -5% para que la máscara "sobrepase" un poco y no deje bordes */
      100% { clip-path: inset(0 0 0 -5%); }
    }

    .rect-azul {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: rgb(26, 84, 140);
      border-radius: 75px;
    }

    .texto1 {
      position: absolute;
      width: 720px;
      font-size: 36px;
      font-weight: bold;
      color: white;
      left: 104.052px;
      top: 20px;
      margin: 0;
    }

    .texto2 {
      position: absolute;
      width: 720px;
      font-size: 28px;
      font-weight: bold;
      font-style: italic;
      color: white;
      left: 104.052px;
      top: 72px;
      margin: 0;
    }

    /* === LOGO === */
    #logo_transp {
      position: absolute;
      width: 147px;
      height: 147px;
      left: 77px;
      top: 867px;
      opacity: 0;
      z-index: 100;
    }

    @keyframes fade-in-logo {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fade-out-total { 
      0% { opacity: 1; } 
      100% { opacity: 0; visibility: hidden; } 
    }
  </style>
</head>
<body>

<div id="main-container" class="container">
  <svg id="ovalo" viewBox="0 0 175 175">
    <ellipse cx="50%" cy="50%" rx="87" ry="87"></ellipse>
  </svg>

  <div id="maskContainer">
    <div class="rect-azul">
      <p id="Texto1" class="texto1">Texto Principal</p>
      <p id="texto2" class="texto2">Texto Secundario</p>
    </div>
  </div>

  <img id="logo_transp" src="assets/logo transp.png">
</div>

<script>
  let ultimoTimestamp = 0;

  function lanzar() {
    const ov = document.getElementById('ovalo');
    const mask = document.getElementById('maskContainer');
    const logo = document.getElementById('logo_transp');
    const cont = document.getElementById('main-container');

    // Reset total
    [ov, mask, logo, cont].forEach(el => {
      el.style.animation = 'none';
      void el.offsetWidth; 
    });

    // Configuración de tiempos
    const duracionTotalOvalo = 1.4; // Un poco más rápido para dar energía
    const momentoApertura = duracionTotalOvalo * 0.6; // Segundo 0.84
    const duracionApertura = duracionTotalOvalo * 0.4; // Segundo 0.56

    // 1. Óvalo: Movimiento principal
    ov.style.animation = `anim-ovalo ${duracionTotalOvalo}s forwards`;

    // 2. Máscara: Sincronización agresiva (empieza justo en el momento de retroceso)
    mask.style.animation = `anim-mask ${duracionApertura}s ${momentoApertura}s linear forwards`;

    // 3. Logo: Aparece EXACTAMENTE cuando el óvalo termina su viaje
    logo.style.animation = `fade-in-logo 0.3s ease-out ${duracionTotalOvalo}s forwards`;

    // 4. Auto-salida
    cont.style.animation = "fade-out-total 0.8s ease 12s forwards";
  }

  async function checkServer() {
    try {
      const res = await fetch("http://localhost:3000/textos");
      const data = await res.json();
      if (data.texto1) document.getElementById('Texto1').textContent = data.texto1;
      if (data.texto2) document.getElementById('texto2').textContent = data.texto2;
      if (data.timestamp && data.timestamp !== ultimoTimestamp) {
        ultimoTimestamp = data.timestamp;
        lanzar();
      }
    } catch (e) {}
  }

  setInterval(checkServer, 500);
</script>
</body>
</html>
