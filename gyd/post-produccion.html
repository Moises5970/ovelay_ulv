<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Créditos</title>
  <style>
    body { font-family: sans-serif; padding: 30px; background: #1a1a1a; color: white; }
    .card { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #8fbdea; position: relative; }
    input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 4px; border: none; background: #3d3d3d; color: white; box-sizing: border-box; }
    textarea { height: 60px; resize: vertical; }
    button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin-top: 10px; }
    .btn-add { background: #444; color: white; }
    .btn-send { background: #28a745; color: white; width: 100%; font-size: 1.2em; }
    .btn-clear { background: #dc3545; color: white; float: right; }
    .btn-delete { background: #dc3545; color: white; position: absolute; right: 10px; top: 10px; padding: 5px 10px; }
    h2 { color: #8fbdea; }
  </style>
</head>
<body>
  <button class="btn-clear" onclick="limpiarTodo()">Limpiar Todo</button>
  <h2>🎬 Créditos Finales</h2>
  <div id="inputs-container"></div>
  
  <button class="btn-add" onclick="agregarFila()">+ Añadir Área</button>
  <button class="btn-send" onclick="enviarDatos()">GUARDAR Y LANZAR CRÉDITOS</button>

  <script>
    async function cargarCache() {
      try {
        const res = await fetch("http://localhost:3000/creditos");
        const data = await res.json();
        if(data.lista && data.lista.length > 0) {
          data.lista.forEach(item => agregarFila(item.area, item.nombres.join('\n')));
        } else { agregarFila(); }
      } catch (e) { agregarFila(); }
    }

    function agregarFila(area = "", nombres = "") {
      const container = document.getElementById('inputs-container');
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <button class="btn-delete" onclick="this.parentElement.remove()">X</button>
        <input type="text" placeholder="ÁREA" class="area" value="${area}">
        <textarea placeholder="NOMBRES" class="nombres">${nombres}</textarea>
      `;
      container.appendChild(div);
    }

    function limpiarTodo() {
      if(confirm("¿Borrar todos los campos?")) {
        document.getElementById('inputs-container').innerHTML = '';
        agregarFila();
      }
    }

    async function enviarDatos() {
      const areas = document.querySelectorAll('.area');
      const nombres = document.querySelectorAll('.nombres');
      const lista = [];
      areas.forEach((el, i) => {
        if(el.value.trim() !== "") {
          const listaNombres = nombres[i].value.split('\n').filter(n => n.trim() !== "");
          lista.push({ area: el.value.toUpperCase(), nombres: listaNombres });
        }
      });
      await fetch("http://localhost:3000/actualizar-creditos", {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ lista: lista })
      });
      alert("Enviado.");
    }
    window.onload = cargarCache;
  </script>
</body>
</html>
