<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      .layer-iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        border: none;
        background: transparent;
        opacity: 0;
        transition: opacity 0.6s ease;
        pointer-events: none;
      }
      .layer-iframe.active {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="layers-wrapper"></div>
    <script>
      let estadoGlobal = {};

      async function motorSincronizador() {
        try {
          // Timestamp ?t= evita que el navegador use una versión vieja del config.json
          const res = await fetch(`config.json?t=${Date.now()}`);
          const capas = await res.json();
          const catsJson = Object.keys(capas);

          // 1. LIMPIEZA: Quitar capas que ya no están en el config
          document.querySelectorAll(".layer-iframe").forEach((iframe) => {
            const id = iframe.id.replace("capa-", "");
            if (!catsJson.includes(id)) {
              iframe.classList.remove("active");
              setTimeout(() => iframe.remove(), 600);
              delete estadoGlobal[id];
            }
          });

          // 2. ACTUALIZACIÓN
          for (const cat in capas) {
            const info = capas[cat];
            if (!info.plantilla) continue;

            let iframe = document.getElementById(`capa-${cat}`);

            // Caso A: La plantilla es la misma, PERO el update (tiempo) cambió
            if (
              estadoGlobal[cat] &&
              estadoGlobal[cat].plantilla === info.plantilla
            ) {
              if (estadoGlobal[cat].update !== info.update) {
                estadoGlobal[cat].update = info.update;
                // Forzamos a la plantilla a re-procesar los datos y reiniciar animaciones
                if (iframe.contentWindow && iframe.contentWindow.recibirDatos) {
                  iframe.contentWindow.recibirDatos(info.datos);
                }
              }
              continue;
            }

            // Caso B: Nueva categoría o cambio de plantilla
            estadoGlobal[cat] = {
              plantilla: info.plantilla,
              update: info.update,
            };

            if (!iframe) {
              iframe = document.createElement("iframe");
              iframe.id = `capa-${cat}`;
              iframe.className = "layer-iframe";
              document.getElementById("layers-wrapper").appendChild(iframe);
            }

            iframe.src = `${cat}/${info.plantilla}/index.html`;

            iframe.onload = () => {
              setTimeout(() => {
                if (iframe.contentWindow && iframe.contentWindow.recibirDatos) {
                  iframe.contentWindow.recibirDatos(info.datos);
                }
                iframe.classList.add("active");
              }, 350);
            };
          }
        } catch (e) {}
      }
      setInterval(motorSincronizador, 1000);
    </script>
  </body>
</html>
