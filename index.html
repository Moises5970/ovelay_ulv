<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      .layer-iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        border: none;
        background: transparent;
        opacity: 0;
        transition: opacity 0.6s;
      }
      .layer-iframe.active {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="layers-wrapper"></div>
    <script>
      let estadoGlobal = {};

      async function motorSincronizador() {
        try {
          const res = await fetch(`config.json?t=${Date.now()}`);
          const capas = await res.json();
          const catsJson = Object.keys(capas);

          document.querySelectorAll(".layer-iframe").forEach((iframe) => {
            const id = iframe.id.replace("capa-", "");
            if (!catsJson.includes(id)) {
              iframe.classList.remove("active");
              setTimeout(() => iframe.remove(), 600);
              delete estadoGlobal[id];
            }
          });

          for (const cat in capas) {
            const info = capas[cat];
            let iframe = document.getElementById(`capa-${cat}`);

            if (
              estadoGlobal[cat] &&
              estadoGlobal[cat].plantilla === info.plantilla
            ) {
              if (estadoGlobal[cat].update !== info.update) {
                estadoGlobal[cat].update = info.update;
                if (iframe.contentWindow.recibirDatos)
                  iframe.contentWindow.recibirDatos(info.datos);
              }
              continue;
            }

            estadoGlobal[cat] = {
              plantilla: info.plantilla,
              update: info.update,
            };
            if (!iframe) {
              iframe = document.createElement("iframe");
              iframe.id = `capa-${cat}`;
              iframe.className = "layer-iframe";
              document.getElementById("layers-wrapper").appendChild(iframe);
            }
            iframe.src = `${cat}/${info.plantilla}/index.html`;
            iframe.onload = () => {
              setTimeout(() => {
                if (iframe.contentWindow.recibirDatos)
                  iframe.contentWindow.recibirDatos(info.datos);
                iframe.classList.add("active");
              }, 300);
            };
          }
        } catch (e) {}
      }
      setInterval(motorSincronizador, 1000);
    </script>
  </body>
</html>
