<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Créditos Scroll</title>
  <style>
    @font-face { font-family: 'AdventSans-Logo'; src: url("assets/AdventSans-Logo.otf") format("opentype"); }
    
    body { 
      margin: 0; padding: 0; background: transparent; 
      width: 1920px; height: 1080px; overflow: hidden; 
      font-family: 'AdventSans-Logo', sans-serif; 
    }

    /* Contenedor que define el límite de visibilidad (1/3 de pantalla) */
    .viewport {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 200px; /* Un tercio exacto de 1080px */
      overflow: hidden; /* Corta el texto que sube */
      background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 70%, transparent 100%);
      opacity: 0;
      transition: opacity 1s ease;
    }

    .visible { opacity: 1; }

    /* El contenedor que realmente se mueve */
    #scroll-container {
      position: absolute;
      width: 100%;
      top: 100%; /* Empieza justo debajo de la ventana */
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: white;
    }

    .area-group { margin-bottom: 60px; width: 100%; }
    .title { font-size: 24px; color: #8fbdea; font-weight: bold; letter-spacing: 4px; margin-bottom: 10px; text-transform: uppercase; }
    .names { font-size: 32px; line-height: 1.4; }

    /* Animación de scroll continuo */
    @keyframes scrollAnimation {
      0% { transform: translateY(0); }
      100% { transform: translateY(-120%); } /* Sube hasta que el final del texto pase el límite */
    }
  </style>
</head>
<body>

<div id="viewport" class="viewport">
  <div id="scroll-container"></div>
</div>

<script>
  let ultimoTimestamp = 0;

  async function check() {
    try {
      const res = await fetch("http://localhost:3000/creditos");
      const data = await res.json();
      if (data.timestamp && data.timestamp !== ultimoTimestamp) {
        ultimoTimestamp = data.timestamp;
        iniciarScroll(data.lista);
      }
    } catch (e) {}
  }

  function iniciarScroll(lista) {
    const scrollContainer = document.getElementById('scroll-container');
    const viewport = document.getElementById('viewport');
    
    // Limpiar y resetear posición
    scrollContainer.innerHTML = '';
    scrollContainer.style.animation = 'none';
    void scrollContainer.offsetWidth; 
    viewport.classList.remove('visible');

    // Construir la lista
    lista.forEach(item => {
      const div = document.createElement('div');
      div.className = 'area-group';
      div.innerHTML = `<div class="title">${item.area}</div>
                       <div class="names">${item.nombres.join('<br>')}</div>`;
      scrollContainer.appendChild(div);
    });

    // Mostrar y calcular duración según la cantidad de nombres
    viewport.classList.add('visible');
    
    // Calculamos velocidad: aprox 3 segundos por bloque de área
    const duracion = Math.max(8, lista.length * 3.5); 
    
    scrollContainer.style.animation = `scrollAnimation ${duracion}s linear forwards`;

    // Ocultar fondo al terminar
    setTimeout(() => { viewport.classList.remove('visible'); }, duracion * 1000 + 500);
  }

  setInterval(check, 1000);
</script>
</body>
</html>
