<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Créditos Scroll</title>
    <style>
      @font-face {
        font-family: "AdventSans-Logo";
        src: url("./assets/AdventSans-Logo.otf") format("opentype");
      }

      body {
        margin: 0;
        padding: 0;
        background: transparent;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        font-family: "AdventSans-Logo", sans-serif;
      }

      /* Contenedor que define el límite de visibilidad (1/3 de pantalla) */
      .viewport {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 250px; /* Un tercio exacto de 1080px */
        overflow: hidden; /* Corta el texto que sube */
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 1) 0%,
          rgba(0, 0, 0, 0.8) 70%,
          transparent 100%
        );
        opacity: 0;
        transition: opacity 1s ease;
      }

      .visible {
        opacity: 1;
      }

      /* El contenedor que realmente se mueve */
      #scroll-container {
        position: absolute;
        width: 100%;
        top: 100%; /* Empieza justo debajo de la ventana */
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        color: white;
      }

      .area-group {
        margin-bottom: 60px;
        width: 100%;
      }
      .title {
        font-size: 24px;
        color: #8fbdea;
        font-weight: bold;
        letter-spacing: 4px;
        margin-bottom: 10px;
        text-transform: uppercase;
      }
      .names {
        font-size: 32px;
        line-height: 1.4;
      }

      /* Animación de scroll continuo */
      @keyframes scrollAnimation {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-120%);
        } /* Sube hasta que el final del texto pase el límite */
      }
    </style>
  </head>
  <body>
    <div id="viewport" class="viewport">
      <div id="scroll-container"></div>
    </div>

    <script>
      // Esta función es el "puente" que recibe los datos desde el Master Control
      window.recibirDatos = function (datos) {
        // Verificamos que existan datos y que sea una lista
        if (datos.lista && Array.isArray(datos.lista)) {
          iniciarScroll(datos.lista);
        }
      };

      function iniciarScroll(lista) {
        const scrollContainer = document.getElementById("scroll-container");
        const viewport = document.getElementById("viewport");

        // 1. LIMPIEZA: Vaciamos el contenedor para que no se acumulen créditos anteriores
        scrollContainer.innerHTML = "";

        // 2. RESET DE ANIMACIÓN: Quitamos la animación y forzamos al navegador a "olvidarla"
        scrollContainer.style.animation = "none";
        void scrollContainer.offsetWidth; // Este es el "Reflow", reinicia el ciclo de CSS
        viewport.classList.remove("visible");

        // 3. CONSTRUCCIÓN: Creamos los bloques de texto según los datos recibidos
        lista.forEach((item) => {
          // Si el área está vacía, saltamos este bloque
          if (!item.area || item.area.trim() === "") return;

          const div = document.createElement("div");
          div.className = "area-group";

          // Unimos los nombres con saltos de línea <br>
          const nombresHtml = Array.isArray(item.nombres)
            ? item.nombres.join("<br>")
            : item.nombres;

          div.innerHTML = `
        <div class="title">${item.area.toUpperCase()}</div>
        <div class="names">${nombresHtml}</div>
      `;
          scrollContainer.appendChild(div);
        });

        // 4. TIEMPOS Y EJECUCIÓN:
        // Calculamos cuánto tiempo debe durar el scroll (3.5s por cada bloque)
        const duracion = Math.max(10, scrollContainer.children.length * 3.5);

        // Hacemos visible el fondo e iniciamos el movimiento
        viewport.classList.add("visible");
        scrollContainer.style.animation = `scrollAnimation ${duracion}s linear forwards`;

        // 5. CIERRE AUTOMÁTICO: Ocultamos el fondo exactamente cuando termina el texto
        // Le sumamos 1000ms (1 segundo) de margen para que no se corte brusco
        setTimeout(
          () => {
            viewport.classList.remove("visible");
          },
          duracion * 1000 + 1000,
        );
      }
    </script>
  </body>
</html>
