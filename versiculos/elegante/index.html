<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        width: 1920px;
        height: 1080px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        font-family: sans-serif;
      }
      #viewport {
        width: 1400px;
        margin-bottom: 80px;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.8s ease,
          transform 0.8s ease;
      }

      .card {
        background: rgba(0, 0, 0, 0.85);
        padding: 40px;
        border-left: 8px solid #007bff;
        border-radius: 0 15px 15px 0;
        /* REDIMENSIONADO SUAVE REAL */
        display: grid;
        grid-template-rows: 1fr;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .content-fade {
        transition: opacity 0.4s ease;
        opacity: 1;
      }
      .fading {
        opacity: 0;
      }

      #Texto1 {
        color: white;
        font-size: 38px;
        margin: 0 0 15px 0;
        font-style: italic;
        line-height: 1.3;
      }
      #texto2 {
        color: #007bff;
        font-size: 24px;
        text-align: right;
        margin: 0;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div id="viewport">
      <div class="card">
        <div id="fader" class="content-fade">
          <p id="Texto1"></p>
          <p id="texto2"></p>
        </div>
      </div>
    </div>
    <script>
      window.recibirDatos = function (datos) {
        const vport = document.getElementById("viewport");
        const fader = document.getElementById("fader");

        if (vport.style.opacity == "1") {
          fader.classList.add("fading");
          setTimeout(() => {
            document.getElementById("Texto1").innerText = datos.v1 || "";
            document.getElementById("texto2").innerText = (
              datos.v2 || ""
            ).toUpperCase();
            fader.classList.remove("fading");
          }, 400);
        } else {
          document.getElementById("Texto1").innerText = datos.v1 || "";
          document.getElementById("texto2").innerText = (
            datos.v2 || ""
          ).toUpperCase();
          vport.style.opacity = "1";
          vport.style.transform = "translateY(0)";
        }
      };
    </script>
  </body>
</html>
