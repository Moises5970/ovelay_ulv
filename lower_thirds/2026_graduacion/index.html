<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lower Third Graduación 2026</title>

    <style>
      @font-face {
        font-family: AdventSans;
        src: url("./assets/AdventSans-Logo.otf");
        font-weight: normal;
        font-style: normal;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background-color: transparent;
        overflow: hidden;
      }

      .canvas {
        position: relative;
        width: 1920px;
        height: 1080px;
      }

      .conten-lw {
        position: absolute;
        bottom: 0px;
        left: 240px;
        width: 1500px;
        height: 200px;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.1s ease,
          visibility 0.1s ease;
      }

      .conten-lw.animar {
        opacity: 1;
        visibility: visible;
      }

      .capa {
        position: absolute;
        height: 120px;
        border-radius: 0%;
      }

      /* Máscaras */
      .mask {
        position: absolute;
        left: 180px;
        top: 0;
        width: 1200px;
        height: 220px;
        overflow: hidden;
      }

      .anim-wrap {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: translateX(-1200px);
      }

      /*capa de fondo*/
      .lt-capa0 {
        position: absolute;
        height: 60px;
        width: 850px;
        background: #f2f2f2;
        top: 20px;
        left: 0px;
        border-radius: 50px;
        overflow: hidden;
        z-index: 1;

        clip-path: polygon(0% 0%, 100% 0, 100% 100%, 2% 100%, 11% 0%);
      }

      /*capa media*/
      .lt-capa1 {
        position: absolute;
        height: 50px;
        width: 900px;
        background: #f2f2f2;
        top: 130px;
        left: 0px;
        border-radius: 50px;
        overflow: hidden;
        z-index: 2;

        clip-path: polygon(0% 0, 100% 0, 100% 100%, 20% 100%, 0 0);
      }

      .lt-capa1-2 {
        position: absolute;
        height: 50px;
        width: 250px;
        background: #d9b51f;
        top: 130px;
        left: 0px;
        overflow: hidden;
        z-index: 3;

        clip-path: polygon(0% 0%, 100% 0, 100% 100%, 37% 100%, 0% 0%);
      }

      /*capa principal*/
      .lt-capa2 {
        position: absolute;
        height: 70px;
        width: 950px;
        background: #2ea4c1;
        top: 70px;
        left: 0px;
        border-radius: 50px;
        overflow: hidden;
        z-index: 4;

        clip-path: polygon(10% 0, 100% 0, 100% 100%, 10% 100%, 0 50%);
      }

      /* Logo */
      .logo {
        position: absolute;
        left: 0px;
        top: -50px;
        width: 350px;
        height: 350px;
        z-index: 10;
        opacity: 0;
      }

      /* Textos */
      .nombre,
      .participation,
      .cargo {
        position: absolute;
        font-weight: 700;
        white-space: nowrap;
        z-index: 20;
      }

      .nombre {
        left: 150px;
        top: 10px;
        font-family: AdventSans;
        font-weight: 900;
        font-size: 32px;
        color: white;
        letter-spacing: 2px;
      }

      .participation {
        left: 150px;
        top: 7.5px;
        font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 50; /* grosor */
        font-size: 28px;
        color: #042b34;
        letter-spacing: 1px;
      }

      .cargo {
        left: 260px;
        top: 15px;
        font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 50; /* grosor */
        font-size: 20px;
        color: #042b34;
        letter-spacing: 1px;
      }

      /* Animaciones (las que ya tenías) */
      .animar .anim-wrap-0 {
        animation: anim-bar 15s cubic-bezier(0.25, 1, 0.5, 1) 0.6s forwards;
      }
      .animar .anim-wrap-1 {
        animation: anim-bar 15s cubic-bezier(0.25, 1, 0.5, 1) 0.7s forwards;
      }
      .animar .anim-wrap-2 {
        animation: anim-bar 15s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
      }

      .animar .logo {
        animation: logo-anim 15s ease forwards;
      }

      @keyframes anim-bar {
        0%,
        5% {
          transform: translateX(-1200px);
        }
        12%,
        88% {
          transform: translateX(0px);
        }
        95%,
        100% {
          transform: translateX(-1200px);
        }
      }

      @keyframes logo-anim {
        0%,
        2% {
          opacity: 0;
          transform: scale(0.8);
        }
        5%,
        95% {
          opacity: 1;
          transform: scale(1);
        }
        98%,
        100% {
          opacity: 0;
          transform: scale(0.8);
        }
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div id="lowercantent" class="conten-lw">
        <div class="mask">
          <div class="anim-wrap anim-wrap-0">
            <div class="capa lt-capa0">
              <div id="participation" class="text participation"></div>
            </div>
          </div>
        </div>

        <div class="mask">
          <div class="anim-wrap anim-wrap-1">
            <div class="capa lt-capa1">
              <div id="cargo" class="text cargo"></div>
            </div>
            <div class="capa lt-capa1-2"></div>
          </div>
        </div>

        <div class="mask">
          <div class="anim-wrap anim-wrap-2">
            <div class="capa lt-capa2">
              <div id="nombre" class="text nombre"></div>
            </div>
          </div>
        </div>

        <img class="logo" src="./assets/logo graduacion 2026.png" alt="logo" />
      </div>
    </div>

    <script>
      window.recibirDatos = function (datos) {
        const contenedor = document.getElementById("lowercantent");

        if (!datos.v1 && !datos.v2 && !datos.v3) {
          contenedor.classList.remove("animar");
          return;
        }

        // Actualizar los tres campos
        document.getElementById("nombre").textContent = datos.v1 || "";
        document.getElementById("cargo").textContent = datos.v2 || "";
        document.getElementById("participation").textContent = datos.v3 || "";

        // Reiniciar animación
        contenedor.classList.remove("animar");
        void contenedor.offsetWidth;

        requestAnimationFrame(() => {
          contenedor.classList.add("animar");
        });
      };
    </script>
  </body>
</html>
