<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Lower Third IASD Corregida</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background: transparent;
        overflow: hidden;
      }

      #scene {
        position: relative;
        width: 1920px;
        height: 1080px;
      }

      /* Punto de anclaje */
      .anchor-center {
        position: absolute;
        left: 260px;
        top: 865px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ===== CÍRCULO ===== */
      .circle {
        position: absolute;
        width: 98px;
        height: 98px;
        background: white;
        border-radius: 50%;
        transform: scale(0);
        opacity: 0;
        animation: circleAnim 8s ease-in-out 1s forwards;
        will-change: transform, opacity;
      }

      @keyframes circleAnim {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        4% {
          transform: scale(1);
          opacity: 1;
        }
        92% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0);
          opacity: 0;
        }
      }

      /* ===== LOGO ===== */
      .logo {
        position: absolute;
        width: 120px;
        height: auto;
        transform: scale(0);
        opacity: 0;
        animation: logoAnim 7.6s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards;
        will-change: transform, opacity;
      }

      @keyframes logoAnim {
        2% {
          transform: scale(1);
          opacity: 0;
        }
        12% {
          transform: scale(1);
          opacity: 1;
        }
        92% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0);
          opacity: 0;
        }
      }

      /* ===== RECTÁNGULO (FONDO) ===== */
      .rect {
        position: absolute;
        top: 800px;
        left: 150px;
        height: 130px;
        width: 900px;
        background: rgb(11, 30, 61);
        border-radius: 35px;
        opacity: 0;
        transform: scaleX(0);
        transform-origin: left center;
        animation: rectAnim 10s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        will-change: transform, opacity;
      }

      @keyframes rectAnim {
        0% {
          transform: scaleX(0);
          opacity: 0;
        }
        8% {
          transform: scaleX(1);
          opacity: 1;
        }
        92% {
          transform: scaleX(1);
          opacity: 1;
        }
        100% {
          transform: scaleX(0);
          opacity: 0;
        }
      }

      /* ===== TEXTOS ===== */
      .texto {
        position: absolute;
        left: 350px;
        font-family: "AdventSans-Logo", sans-serif;
        color: white;
        opacity: 0;
        animation: textAnim 7.4s ease-out 1.4s forwards;
        will-change: transform, opacity;
      }

      #texto1 {
        top: 832px;
        font-size: 34px;
        font-weight: bold;
      }
      #texto2 {
        top: 870px;
        font-size: 24px;
        font-style: italic;
      }

      @keyframes textAnim {
        1% {
          opacity: 0;
          transform: translateX(-15px);
        }
        12% {
          opacity: 1;
          transform: translateX(0);
        }
        93% {
          opacity: 1;
          transform: translateX(0);
        }
        100% {
          opacity: 0;
        }
      }

      @font-face {
        font-family: AdventSans-Logo;
        src: url("assets/AdventSans-Regular.otf");
      }
    </style>
  </head>

  <body>
    <div id="scene">
      <div id="rect-bg" class="rect"></div>

      <div class="anchor-center">
        <div id="circle-white" class="circle"></div>
        <img id="logo-iasd" class="logo" src="assets/logo IASD.png" />
      </div>

      <div id="texto1" class="texto"></div>
      <div id="texto2" class="texto"></div>
    </div>

    <script>
      /**
       * FUNCIÓN MAESTRA: Recibe v1 (Nombre) y v2 (Cargo)
       */
      window.recibirDatos = function (datos) {
        document.getElementById("texto1").innerText = datos.v1 || "";
        document.getElementById("texto2").innerText = datos.v2 || "";

        iniciarEfectos();
      };

      /**
       * Reset total de animaciones para permitir lanzamientos consecutivos
       */
      function iniciarEfectos() {
        const elementos = [
          document.getElementById("circle-white"),
          document.getElementById("logo-iasd"),
          document.getElementById("rect-bg"),
          document.getElementById("texto1"),
          document.getElementById("texto2"),
        ];

        // 1. Matamos las animaciones
        elementos.forEach((el) => {
          if (el) {
            el.style.animation = "none";
            void el.offsetWidth; // Reflow: Fuerza al navegador a reiniciar el reloj
          }
        });

        // 2. Re-aplicamos las animaciones con sus tiempos originales
        document.getElementById("circle-white").style.animation =
          "circleAnim 8s ease-in-out 1s forwards";
        document.getElementById("logo-iasd").style.animation =
          "logoAnim 7.6s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards";
        document.getElementById("rect-bg").style.animation =
          "rectAnim 10s cubic-bezier(0.4, 0, 0.2, 1) forwards";

        const textAnim = "textAnim 7.4s ease-out 1.4s forwards";
        document.getElementById("texto1").style.animation = textAnim;
        document.getElementById("texto2").style.animation = textAnim;
      }
    </script>
  </body>
</html>
