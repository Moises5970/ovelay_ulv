<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Lower Third IASD Estandarizada</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background: transparent;
        overflow: hidden;
      }

      /* Contenedor principal neutralizado para el control absoluto del render */
      #scene {
        position: relative;
        width: 1920px;
        height: 1080px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.1s ease, visibility 0.1s ease;
        transform: translateY(100px);
      }

      /* El contenedor cobra vida y visibilidad solo bajo control de la clase .animar */
      #scene.animar {
        opacity: 1;
        visibility: visible;
      }

      /* Punto de anclaje */
      .anchor-center {
        position: absolute;
        left: 260px;
        top: 865px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ===== CÍRCULO ===== */
      .circle {
        position: absolute;
        width: 98px;
        height: 98px;
        background: white;
        border-radius: 50%;
        transform: scale(0);
        opacity: 0;
        will-change: transform, opacity;
      }

      /* Animación vinculada a la clase contenedora */
      .animar .circle {
        animation: circleAnim 8s ease-in-out 1s forwards;
      }

      @keyframes circleAnim {
        0% { transform: scale(0); opacity: 0; }
        4% { transform: scale(1); opacity: 1; }
        92% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0); opacity: 0; }
      }

      /* ===== LOGO ===== */
      .logo {
        position: absolute;
        width: 120px;
        height: auto;
        transform: scale(0);
        opacity: 0;
        will-change: transform, opacity;
      }

      /* Animación vinculada a la clase contenedora */
      .animar .logo {
        animation: logoAnim 7.6s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards;
      }

      @keyframes logoAnim {
        2% { transform: scale(1); opacity: 0; }
        12% { transform: scale(1); opacity: 1; }
        92% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0); opacity: 0; }
      }

      /* ===== RECTÁNGULO (FONDO) ===== */
      .rect {
        position: absolute;
        top: 800px;
        left: 150px;
        height: 130px;
        width: 900px;
        background: rgb(11, 30, 61);
        border-radius: 35px;
        opacity: 0;
        transform: scaleX(0);
        transform-origin: left center;
        will-change: transform, opacity;
      }

      /* Animación vinculada a la clase contenedora */
      .animar .rect {
        animation: rectAnim 10s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes rectAnim {
        0% { transform: scaleX(0); opacity: 0; }
        8% { transform: scaleX(1); opacity: 1; }
        92% { transform: scaleX(1); opacity: 1; }
        100% { transform: scaleX(0); opacity: 0; }
      }

      /* ===== TEXTOS ===== */
      .texto {
        position: absolute;
        left: 350px;
        font-family: "AdventSans-Logo", sans-serif;
        color: white;
        opacity: 0;
        will-change: transform, opacity;
      }

      #texto1 {
        top: 832px;
        font-size: 34px;
        font-weight: bold;
      }
      #texto2 {
        top: 870px;
        font-size: 24px;
        font-style: italic;
      }

      /* Animaciones vinculadas a la clase contenedora */
      .animar .texto {
        animation: textAnim 7.4s ease-out 1.4s forwards;
      }

      @keyframes textAnim {
        1% { transform: translateX(-15px); opacity: 0; }
        12% { transform: translateX(0); opacity: 1; }
        93% { transform: translateX(0); opacity: 1; }
        100% { opacity: 0; }
      }

      @font-face {
        font-family: AdventSans-Logo;
        src: url("assets/AdventSans-Regular.otf");
      }
    </style>
  </head>

  <body>
    <div id="scene">
      <div id="rect-bg" class="rect"></div>

      <div class="anchor-center">
        <div id="circle-white" class="circle"></div>
        <img id="logo-iasd" class="logo" src="assets/logo IASD.png" />
      </div>

      <div id="texto1" class="texto"></div>
      <div id="texto2" class="texto"></div>
    </div>

    <script>
      /**
       * FUNCIÓN MAESTRA ESTANDARIZADA
       */
      window.recibirDatos = function (datos) {
        const overlay = document.getElementById("scene");

        // Si se apaga la capa desde el panel de control
        if (!datos.v1 && !datos.v2) {
          overlay.classList.remove("animar");
          return;
        }

        // 1. Congelamos el render y removemos la clase de golpe
        overlay.classList.remove("animar");

        // 2. Modificamos los contenidos a oscuras sin parpadeos residuales
        document.getElementById("texto1").innerText = datos.v1 || "";
        document.getElementById("texto2").innerText = datos.v2 || "";

        // 3. Forzamos Reflow síncrono del motor web
        void overlay.offsetWidth;

        // 4. Doble ciclo de animación por hardware (requestAnimationFrame)
        // Esto limpia por completo el búfer anterior garantizando un relanzamiento limpio
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            overlay.classList.add("animar");
          });
        });
      };
    </script>
  </body>
</html>
