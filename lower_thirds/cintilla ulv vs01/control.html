<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Lower Third</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family: Arial, sans-serif;
  padding:20px;
}
input {
  width:100%;
  padding:8px;
  font-size:16px;
  margin-bottom:8px;
}
button {
  padding:10px;
  font-size:16px;
  cursor:pointer;
}
.controls {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
#live {
  background:#c62828;
  color:#fff;
  border:none;
}
#add {
  background:#2e7d32;
  color:#fff;
  border:none;
}
#del {
  background:#555;
  color:#fff;
  border:none;
}
select {
  width:100%;
  height:220px;
  font-size:14px;
}
</style>
</head>

<body>

<h2>LOWER THIRD – CONTROL</h2>

<input id="t1" placeholder="Texto 1 (Nombre)">
<input id="t2" placeholder="Texto 2 (Subtítulo)">

<div class="controls">
  <button id="add" onclick="guardar()">+</button>
  <button id="del" onclick="eliminar()">−</button>
  <button id="live" onclick="live()">LIVE</button>
</div>

<select id="lista" size="10" onchange="cargar()"></select>

<script>
const API = "http://localhost:3000";

const t1 = document.getElementById("t1");
const t2 = document.getElementById("t2");
const lista = document.getElementById("lista");

let presets = [];
let indexSeleccionado = -1;

// 🔄 cargar presets al iniciar
fetch(API + "/presets")
  .then(r => r.json())
  .then(data => {
    presets = data;
    renderLista();
  });

function renderLista() {
  lista.innerHTML = "";
  presets.forEach((p, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = `${p.texto1} — ${p.texto2}`;
    lista.appendChild(opt);
  });
}

function guardar() {
  if (!t1.value && !t2.value) return;

  presets.push({
    texto1: t1.value,
    texto2: t2.value
  });

  sync();
}

function eliminar() {
  if (indexSeleccionado < 0) return;
  presets.splice(indexSeleccionado, 1);
  indexSeleccionado = -1;
  sync();
}

function cargar() {
  indexSeleccionado = lista.selectedIndex;
  const p = presets[indexSeleccionado];
  t1.value = p.texto1;
  t2.value = p.texto2;
}

function live() {
  fetch(API + "/set", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      texto1: t1.value,
      texto2: t2.value
    })
  });
}

function sync() {
  fetch(API + "/presets", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(presets)
  }).then(() => {
    renderLista();
  });
}
</script>

</body>
</html>
